<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>FridgeChef - Cosa cuciniamo oggi?</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="Genera ricette basate sugli ingredienti che hai nel frigo.">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FridgeChef">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
    <link rel="apple-touch-icon" href="/icon-180.png">
    <link rel="manifest" href="/manifest.json">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header>
        <h1 id="main-title">FridgeChef</h1>
        <p id="main-subtitle">Inserisci quello che hai, noi troviamo la ricetta perfetta.</p>
      </header>

      <nav class="tab-nav">
        <button id="tab-recipes" class="active">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
          <span>Ricette</span>
        </button>
        <button id="tab-shopping">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span>Spesa</span>
        </button>
      </nav>

      <div id="view-recipes" class="main-container active">
        <aside class="input-section">
          <div class="glass-card">
            <h2>
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
              Tempo Max: <span id="time-val">60</span> min
            </h2>
            <div class="slider-container">
              <input type="range" id="time-slider" min="5" max="120" step="5" value="60">
              <div class="slider-labels">
                <span>5</span>
                <span>30</span>
                <span>60</span>
                <span>90</span>
                <span>120</span>
              </div>
            </div>
          </div>

          <div class="glass-card">
            <h2>
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 21V3a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v18a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2z"></path><path d="M22 21V3a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v18a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2z"></path><path d="M2 7h8"></path><path d="M14 7h8"></path><path d="M2 11h8"></path><path d="M14 11h8"></path><path d="M2 15h8"></path><path d="M14 15h8"></path></svg>
              Il tuo Frigo
            </h2>
            <form id="ingredient-form" class="input-group">
              <input type="text" id="ingredient-input" placeholder="Aggiungi ingrediente..." autocomplete="off">
              <button type="submit" class="primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span class="btn-text">Aggiungi</span>
              </button>
            </form>
            <div id="fridge-tags" class="tag-container">
              <!-- Tags added dynamically -->
            </div>
          </div>

          <div class="glass-card">
            <h2>
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v18H3z"></path><path d="M9 3v18"></path><path d="M15 3v18"></path><path d="M3 9h18"></path><path d="M3 15h18"></path></svg>
              Dispensa Base
            </h2>
            <p class="pantry-desc">Ingredienti che hai sempre a portata di mano.</p>
            
            <form id="pantry-form" class="input-group input-group-sm">
              <input type="text" id="pantry-input" placeholder="Aggiungi base (es. Pepe)..." autocomplete="off">
              <button type="submit" class="secondary">+</button>
            </form>

            <div id="pantry-grid" class="pantry-grid">
              <!-- Pantry items added dynamically -->
            </div>
          </div>
        </aside>

        <main class="results-section" id="results-container">
          <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path><path d="M7 2v20"></path><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"></path></svg>
            <p>Aggiungi ingredienti per scoprire cosa puoi cucinare!</p>
          </div>
        </main>
      </div>

      <div id="view-shopping" class="main-container">
        <aside class="input-section">
          <div class="glass-card">
            <h2>
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
              Manuale
            </h2>
            <form id="shopping-form" class="input-group">
              <input type="text" id="shopping-input" placeholder="Aggiungi alla spesa..." autocomplete="off">
              <button type="submit" class="primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span class="btn-text">Aggiungi</span>
              </button>
            </form>
          </div>
        </aside>
        <main class="results-section">
          <div class="glass-card">
            <h2>La tua Spesa</h2>
            <div id="shopping-list-container">
              <!-- Shopping items added dynamically -->
            </div>
          </div>
        </main>
      </div>
      <!-- Recipe Detail Modal -->
      <div id="recipe-modal" class="modal">
        <div class="modal-content glass-card">
          <button id="close-modal" class="close-btn">&times;</button>
          <div id="modal-body">
            <!-- Content injected via JS -->
          </div>
        </div>
      </div>

    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('SW registered:', reg.scope))
            .catch((err) => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
